<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Devangi Products</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .step { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-orange-50 flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden backdrop-blur-lg bg-opacity-90 border border-white/50 p-8">
        
        <div class="text-center mb-8">
            <a href="/index.html"><img src="/assets/images/logo/logo.svg" alt="Devangi Products Logo" class="mx-auto h-8 mb-6"></a>
            <h2 class="text-3xl font-bold text-gray-800" id="page-title">Welcome Back</h2>
            <p class="text-gray-500 mt-2 text-sm" id="page-subtitle">Enter your email to continue</p>
        </div>

        <!-- Step 1: Enter Email -->
        <div id="step-1" class="step space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="text" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition bg-gray-50 text-gray-800" placeholder="you@example.com" required>
            </div>
            
            <button id="check-email-btn" class="w-full bg-gradient-to-r from-pink-500 to-orange-400 text-white font-semibold py-3 rounded-xl shadow-lg hover:shadow-pink-500/30 transform hover:-translate-y-0.5 transition duration-200">
                Continue
            </button>

            <p class="text-center text-gray-500 text-sm">
                Don't have an account? <a href="/register.html" class="text-pink-500 font-semibold hover:underline">Register</a>
            </p>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-[10px] uppercase tracking-wider font-semibold">Or</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <button onclick="continueAsGuest()" class="w-full bg-white border border-gray-200 text-gray-700 font-semibold py-3 rounded-xl hover:bg-gray-50 transition duration-200 flex items-center justify-center gap-2 text-sm shadow-sm hover:border-gray-300">
                <span>👤</span> Continue as Guest (No Email / OTP)
            </button>
        </div>

        <!-- Step 2: OTP Verification (existing user) -->
        <div id="step-2" class="step space-y-5 hidden">
            <div class="bg-green-50 border border-green-200 rounded-xl p-3 flex items-center gap-2">
                <span class="text-green-600 text-lg">✓</span>
                <p class="text-sm text-green-700">Account found! We'll send an OTP to verify it's you.</p>
            </div>

            <div>
                <p class="text-sm text-gray-500 mb-1">Sending OTP to: <span id="display-email" class="font-semibold text-gray-700"></span></p>
                <button id="send-otp-btn" class="w-full bg-gradient-to-r from-pink-500 to-orange-400 text-white font-semibold py-3 rounded-xl shadow-lg hover:shadow-pink-500/30 transform hover:-translate-y-0.5 transition duration-200">
                    Send OTP
                </button>
            </div>

            <button id="back-btn-1" class="w-full border border-gray-200 text-gray-600 font-medium py-2.5 rounded-xl hover:bg-gray-50 transition text-sm">
                ← Change Email
            </button>
        </div>

        <!-- Step 3: Enter OTP / Password -->
        <div id="step-3" class="step space-y-5 hidden">
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label id="step3-label" class="block text-sm font-medium text-gray-700">Enter 6-Digit OTP</label>
                    <span id="resend-text" class="text-xs text-pink-500 cursor-pointer hidden" onclick="resendOtp()">Resend Code</span>
                </div>
                <!-- OTP Input (for customers) -->
                <input type="text" id="otp" maxlength="6" inputmode="numeric" pattern="[0-9]*"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 text-center tracking-[0.5em] font-bold text-xl transition bg-gray-50"
                    placeholder="------">
                
                <!-- Password Input (for Admin/Staff - completely separate to guarantee normal keyboard on mobile) -->
                <input type="password" id="admin-password"
                    class="hidden w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 font-medium text-base transition bg-gray-50"
                    placeholder="Enter password">
                    
                <p class="text-xs text-gray-400 mt-2 text-center" id="email-sent-to"></p>
            </div>
            
            <button id="verify-otp-btn" class="w-full bg-gradient-to-r from-pink-500 to-orange-400 text-white font-semibold py-3 rounded-xl shadow-lg hover:shadow-pink-500/30 transform hover:-translate-y-0.5 transition duration-200">
                Verify & Login
            </button>
            
            <button id="back-btn-2" class="w-full border border-gray-200 text-gray-600 font-medium py-2.5 rounded-xl hover:bg-gray-50 transition text-sm">
                ← Back
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50 flex items-center">
        <span id="toast-msg"></span>
    </div>

    <script src="/assets/js/auth.js"></script>
    <script>
        function continueAsGuest() {
            sessionStorage.setItem('guest_checkout', 'true');
            const cart = JSON.parse(localStorage.getItem('anon_cart')) || [];
            if (cart.length > 0) {
                window.location.href = '/checkout.html';
            } else {
                window.location.href = '/index.html';
            }
        }
    </script>
</body>
</html>
