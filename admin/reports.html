<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Devangi Sewing Store</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body { font-family: 'Inter', sans-serif; } ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }</style>
</head>
<body class="text-gray-800 antialiased overflow-hidden flex h-screen">
    <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 hidden md:hidden"></div>
    <!-- Sidebar (rendered by sidebar.js) -->
    <aside id="admin-sidebar"></aside>

    <div class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block">Reports & Analytics</h1>
            </div>
            <div class="flex items-center gap-3">
                <input type="date" id="report-start" class="text-sm px-3 py-1.5 border border-gray-200 rounded-lg">
                <span class="text-gray-400 text-sm">to</span>
                <input type="date" id="report-end" class="text-sm px-3 py-1.5 border border-gray-200 rounded-lg">
                <button onclick="loadReports()" class="bg-pink-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-pink-600">Apply</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="max-w-7xl mx-auto space-y-6">
                <!-- Revenue Stats -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><p class="text-sm font-semibold text-gray-500 mb-1">Total Revenue</p><h3 class="text-2xl font-bold text-gray-900" id="r-revenue">Rs. 0</h3></div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><p class="text-sm font-semibold text-gray-500 mb-1">Total Orders</p><h3 class="text-2xl font-bold text-gray-900" id="r-orders">0</h3></div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><p class="text-sm font-semibold text-gray-500 mb-1">Avg Order Value</p><h3 class="text-2xl font-bold text-gray-900" id="r-aov">Rs. 0</h3></div>
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100"><p class="text-sm font-semibold text-gray-500 mb-1">Cancelled Orders</p><h3 class="text-2xl font-bold text-red-500" id="r-cancelled">0</h3></div>
                </div>

                <!-- Charts -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                        <h3 class="font-bold text-gray-800 mb-4">📈 Monthly Revenue</h3>
                        <div class="min-h-[280px]"><canvas id="revenueChart"></canvas></div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                        <h3 class="font-bold text-gray-800 mb-4">💳 Payment Methods</h3>
                        <div class="min-h-[280px]"><canvas id="paymentChart"></canvas></div>
                    </div>
                </div>

                <!-- Tables -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- Top Products -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                        <h3 class="font-bold text-gray-800 mb-4">🔥 Top Selling Products</h3>
                        <div class="space-y-3" id="top-products-list">
                            <p class="text-gray-400 text-sm text-center py-4">Loading...</p>
                        </div>
                    </div>
                    <!-- City Orders -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                        <h3 class="font-bold text-gray-800 mb-4">📍 Orders by City</h3>
                        <div id="city-orders-list" class="space-y-2">
                            <p class="text-gray-400 text-sm text-center py-4">Loading...</p>
                        </div>
                    </div>
                </div>

                <!-- Category Sales -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-gray-800 mb-4">🏷️ Sales by Category</h3>
                    <div id="category-sales-list" class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <p class="text-gray-400 text-sm text-center py-4 col-span-full">Loading...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/admin/js/sidebar.js?v=2"></script>
    <script src="/admin/js/admin.js?v=2"></script>
    <script>
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#64748b';
        let revChart, payChart;

        document.addEventListener('DOMContentLoaded', () => {
            // Default: this year
            const now = new Date();
            document.getElementById('report-start').value = `${now.getFullYear()}-01-01`;
            document.getElementById('report-end').value = now.toLocaleDateString('en-CA');
            loadReports();
        });

        async function loadReports() {
            const startDate = document.getElementById('report-start').value;
            const endDate = document.getElementById('report-end').value;
            try {
                const res = await fetch(`/api/admin/reports?startDate=${startDate}&endDate=${endDate}`);
                const data = await res.json();
                renderReports(data);
            } catch (err) { console.error(err); }
        }

        function renderReports(data) {
            // Stats
            const rev = data.revenue || {};
            document.getElementById('r-revenue').textContent = `Rs. ${parseFloat(rev.total_revenue || 0).toLocaleString('en-IN')}`;
            document.getElementById('r-orders').textContent = rev.total_orders || 0;
            document.getElementById('r-aov').textContent = `Rs. ${parseFloat(rev.avg_order_value || 0).toFixed(0)}`;
            document.getElementById('r-cancelled').textContent = rev.cancelled_orders || 0;

            // Revenue Chart
            if (revChart) revChart.destroy();
            const monthly = (data.monthly || []).reverse();
            const ctx1 = document.getElementById('revenueChart').getContext('2d');
            const gradient = ctx1.createLinearGradient(0, 0, 0, 280);
            gradient.addColorStop(0, 'rgba(236,72,153,0.2)');
            gradient.addColorStop(1, 'rgba(236,72,153,0)');
            revChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: monthly.map(m => m.month),
                    datasets: [{
                        label: 'Revenue',
                        data: monthly.map(m => m.revenue),
                        borderColor: '#ec4899', backgroundColor: gradient,
                        borderWidth: 3, pointRadius: 4, fill: true, tension: 0.4,
                        pointBackgroundColor: '#fff', pointBorderColor: '#ec4899', pointBorderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { borderDash: [4,4], color: '#f1f5f9' } }, x: { grid: { display: false } } } }
            });

            // Payment Chart
            if (payChart) payChart.destroy();
            const payments = data.paymentMethods || [];
            const payColors = ['#ec4899', '#3b82f6', '#22c55e', '#eab308', '#8b5cf6'];
            payChart = new Chart(document.getElementById('paymentChart'), {
                type: 'doughnut',
                data: {
                    labels: payments.length ? payments.map(p => p.payment_method) : ['No Data'],
                    datasets: [{ data: payments.length ? payments.map(p => p.count) : [1], backgroundColor: payments.length ? payColors.slice(0, payments.length) : ['#e2e8f0'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { padding: 15 } } } }
            });

            // Top Products
            const topList = document.getElementById('top-products-list');
            const tops = data.topProducts || [];
            topList.innerHTML = tops.length ? tops.map((p, i) => `
                <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50">
                    <span class="w-6 h-6 rounded-full bg-pink-50 text-pink-600 flex items-center justify-center text-xs font-bold shrink-0">${i + 1}</span>
                    <div class="flex-1 min-w-0"><p class="text-sm font-medium text-gray-800 truncate">${p.name}</p></div>
                    <div class="text-right shrink-0"><p class="text-sm font-bold text-gray-900">${p.total_sold} sold</p><p class="text-[10px] text-gray-400">Rs.${parseFloat(p.total_revenue).toLocaleString()}</p></div>
                </div>
            `).join('') : '<p class="text-gray-400 text-sm text-center py-4">No data</p>';

            // City Orders
            const cityList = document.getElementById('city-orders-list');
            const cities = data.cityOrders || [];
            cityList.innerHTML = cities.length ? cities.map(c => `
                <div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                    <span class="text-sm text-gray-700 font-medium">${c.city}</span>
                    <div class="text-right"><span class="text-sm font-bold text-gray-900">${c.orders} orders</span> <span class="text-xs text-gray-400 ml-1">Rs.${parseFloat(c.revenue).toLocaleString()}</span></div>
                </div>
            `).join('') : '<p class="text-gray-400 text-sm text-center py-4">No data</p>';

            // Category Sales
            const catList = document.getElementById('category-sales-list');
            const cats = data.categorySales || [];
            catList.innerHTML = cats.length ? cats.map(c => `
                <div class="bg-gray-50 rounded-xl p-4 text-center">
                    <p class="text-xs text-gray-500 font-medium mb-1">${c.category}</p>
                    <p class="text-lg font-bold text-gray-900">${c.sold}</p>
                    <p class="text-[10px] text-pink-500 font-medium">Rs.${parseFloat(c.revenue).toLocaleString()}</p>
                </div>
            `).join('') : '<p class="text-gray-400 text-sm text-center py-4 col-span-full">No data</p>';
        }
    </script>
</body>
</html>
