<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Devangi Sewing Products</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .tab-active { color: #ec4899; border-bottom: 3px solid #ec4899; }
        
        .order-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .order-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }

        .modal-blur { backdrop-filter: blur(8px); }
        .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Stepper */
        .step-node { width: 32px; height: 32px; border-radius: 50%; background: #fff; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; position: relative; z-index: 2; transition: all 0.3s; }
        .step-node.active { border-color: #ec4899; background: #ec4899; color: #fff; box-shadow: 0 0 15px rgba(236, 72, 153, 0.3); }
        .step-line { position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: #f1f5f9; z-index: 0; }
        .step-line-active { position: absolute; top: 15px; left: 0; height: 2px; background: #ec4899; transition: width 1s ease-in-out; z-index: 1; }
        
        .status-badge { @apply px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border; }
        .bg-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }

        /* Review Stars */
        .star-btn { cursor: pointer; transition: color 0.2s; }
        .star-btn:hover, .star-btn.active { color: #f5a623; }
        .star-btn.inactive { color: #d1d5db; }

        @media print {
            body > :not(#invoiceModal) {
                display: none !important;
            }
            #invoiceModal {
                position: static !important;
                display: block !important;
                background: transparent !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
            }
            #invoiceModal > div {
                width: 100% !important;
                max-width: 100% !important;
                max-height: none !important;
                overflow: visible !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
                background: transparent !important;
            }
            .no-print {
                display: none !important;
            }
            @page {
                margin: 0;
            }
            body {
                padding: 20mm !important;
                background: white !important;
            }
        }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="/index.html"><img src="/assets/images/logo/logo.svg" alt="Logo" class="h-8"></a>
                <div class="h-6 w-[1px] bg-gray-200 hidden md:block"></div>
                <h2 class="text-sm font-bold text-gray-700 hidden md:block">Account Settings</h2>
            </div>
            <div class="flex items-center gap-4">
                <a href="/shop.html" class="text-gray-500 hover:text-pink-500 text-sm font-medium">Continue Shopping</a>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-6xl flex flex-col md:flex-row gap-8">
        
        <!-- Sidebar Navigation (Kwikpass Style) -->
        <aside class="w-full md:w-72 shrink-0">
            <!-- User Profile Summary -->
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-8 mb-4 flex flex-col items-center text-center">
                <div class="w-24 h-24 rounded-full bg-gradient-to-br from-pink-500 to-rose-400 flex items-center justify-center text-white text-3xl font-bold shadow-lg mb-4" id="user-initial">D</div>
                <h1 class="text-xl md:text-2xl font-bold text-gray-900 mb-1" id="user-name">Loading...</h1>
                <p class="text-gray-400 text-sm mb-4" id="user-email">email@example.com</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <span class="bg-pink-50 text-pink-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Premium</span>
                    <span id="order-count-badge" class="bg-gray-50 text-gray-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">0 Orders</span>
                </div>
            </div>

            <!-- Tab Navigation -->
            <nav class="bg-white rounded-2xl shadow-sm border border-gray-100 p-2 flex flex-col gap-1">
                <button id="tab-orders" onclick="switchTab('orders')" class="w-full text-left px-4 py-3 rounded-xl bg-pink-50 text-pink-600 font-bold flex items-center gap-3 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    My Orders
                </button>
                <button id="tab-addresses" onclick="switchTab('addresses')" class="w-full text-left px-4 py-3 rounded-xl text-gray-500 font-medium hover:bg-gray-50 flex items-center gap-3 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Saved Addresses
                </button>
                <button onclick="logout()" class="w-full text-left px-4 py-3 rounded-xl text-red-500 font-medium hover:bg-red-50 flex items-center gap-3 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </button>
            </nav>
        </aside>

        <!-- Main Content Area (Orders) -->
        <div class="flex-grow">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-8 relative min-h-[500px]">
                
                <!-- ORDERS SECTION -->
                <div id="section-orders">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Order History</h2>
                
                <!-- Filters & Sort -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 bg-gray-50 p-4 rounded-2xl">
                    <div class="flex gap-4 md:gap-6 overflow-x-auto w-full md:w-auto pb-2 md:pb-0 hide-scrollbar">
                        <button onclick="filterOrders('all')" id="filter-all" class="tab-active pb-2 text-sm font-bold transition-all px-2 whitespace-nowrap border-b-2 border-transparent">All Orders</button>
                        <button onclick="filterOrders('ongoing')" id="filter-ongoing" class="pb-2 text-sm font-bold text-gray-400 hover:text-gray-600 transition-all px-2 whitespace-nowrap border-b-2 border-transparent">Ongoing</button>
                        <button onclick="filterOrders('Delivered')" id="filter-delivered" class="pb-2 text-sm font-bold text-gray-400 hover:text-gray-600 transition-all px-2 whitespace-nowrap border-b-2 border-transparent">Delivered</button>
                        <button onclick="filterOrders('Cancelled')" id="filter-cancelled" class="pb-2 text-sm font-bold text-gray-400 hover:text-gray-600 transition-all px-2 whitespace-nowrap border-b-2 border-transparent">Cancelled</button>
                    </div>
                    <div class="flex items-center gap-3 w-full md:w-auto shrink-0">
                        <span class="text-xs font-bold text-gray-400 uppercase">Sort:</span>
                        <select onchange="sortOrders(this.value)" class="bg-white border border-gray-200 rounded-xl px-4 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-pink-500 transition">
                            <option value="latest">Latest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="total">Highest Amount</option>
                        </select>
                    </div>
                </div>

                <!-- Orders Container -->
                <div id="orders-container" class="space-y-6">
                    <div class="skeleton-item space-y-4">
                        <div class="h-40 w-full rounded-2xl bg-gray-100 animate-pulse"></div>
                        <div class="h-40 w-full rounded-2xl bg-gray-100 animate-pulse"></div>
                    </div>
                </div>
                </div> <!-- End section-orders -->
                
                <!-- ADDRESSES SECTION -->
                <div id="section-addresses" class="hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-900">Saved Addresses</h2>
                        <button onclick="openAddressModal()" class="px-4 py-2 bg-pink-500 text-white rounded-xl text-xs font-bold hover:bg-pink-600 transition flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add New
                        </button>
                    </div>
                    
                    <div id="addresses-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Addresses injected here -->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Unified Order Details Modal (Premium Shopify Style) -->
    <div id="orderDetailsModal" class="fixed inset-0 bg-black/60 modal-blur hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-[#f6f6f7] rounded-3xl shadow-2xl w-full max-w-5xl max-h-[95vh] overflow-hidden flex flex-col animate-zoom-in">
            <!-- Modal Header -->
            <div class="bg-white px-4 md:px-8 py-4 md:py-6 border-b border-gray-100 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-6">
                    <button onclick="document.getElementById('orderDetailsModal').classList.add('hidden')" class="p-3 hover:bg-gray-100 rounded-2xl text-gray-400 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div>
                        <div class="flex items-center gap-3 mb-1">
                            <h3 class="text-lg md:text-2xl font-black text-gray-900 tracking-tight" id="modal-order-id">#ORD-0000</h3>
                            <span id="modal-status-badge" class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest bg-pink-100 text-pink-600 border border-pink-200">Processing</span>
                        </div>
                        <p class="text-xs text-gray-400 font-bold" id="modal-order-date">April 27, 2026 at 3:01 AM</p>
                    </div>
                </div>
                <button onclick="document.getElementById('orderDetailsModal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="flex-grow overflow-y-auto p-4 md:p-8" id="order-details-content">
                <!-- Dynamic Content injected here -->
            </div>
        </div>
    </div>

    <!-- Invoice Modal -->
    <div id="invoiceModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-4 md:p-8">
            <div id="invoice-preview-content"></div>
            <div class="mt-8 flex justify-end gap-3 no-print">
                <button onclick="document.getElementById('invoiceModal').classList.add('hidden')" class="px-6 py-2 text-gray-500 font-bold">Close</button>
                <button onclick="window.print()" class="px-6 py-2 bg-pink-500 text-white rounded-xl font-bold">Print</button>
            </div>
        </div>
    </div>

    
    <!-- Address Modal -->
    <div id="addressModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[120] p-4 modal-blur">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md animate-zoom-in overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-gray-900 text-lg">Add New Address</h3>
                <button onclick="closeAddressModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="addressForm" onsubmit="saveAddress(event)" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">First Name</label>
                        <input type="text" id="addr_fname" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Last Name</label>
                        <input type="text" id="addr_lname" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Phone Number</label>
                    <input type="tel" id="addr_phone" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">House / Flat / Floor *</label>
                        <input type="text" id="addr_house" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Society / Building *</label>
                        <input type="text" id="addr_society" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Street / Area *</label>
                    <input type="text" id="addr_street" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Landmark (Optional)</label>
                    <input type="text" id="addr_landmark" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">City *</label>
                        <input type="text" id="addr_city" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">State *</label>
                        <input type="text" id="addr_state" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Pincode *</label>
                        <input type="text" id="addr_pincode" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none">
                    </div>
                </div>
                <div class="flex items-center gap-2 mt-4">
                    <input type="checkbox" id="addr_default" class="rounded text-pink-500 focus:ring-pink-500">
                    <label for="addr_default" class="text-sm text-gray-700">Set as default address</label>
                </div>
                <div class="pt-4 border-t border-gray-100 flex justify-end">
                    <button type="submit" class="px-6 py-2.5 bg-pink-500 text-white font-bold rounded-xl text-sm hover:bg-pink-600 transition w-full">Save Address</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="reviewModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[130] p-4 modal-blur">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md animate-zoom-in overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-gray-900 text-lg">Rate Product</h3>
                <button onclick="closeReviewModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6">
                <div class="flex items-center gap-4 mb-6">
                    <img id="review-prod-img" src="" class="w-16 h-16 rounded-xl object-cover border">
                    <div>
                        <h4 id="review-prod-name" class="font-bold text-gray-900 text-sm">Product Name</h4>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Share your experience</p>
                    </div>
                </div>
                
                <form id="reviewForm" onsubmit="submitReview(event)" class="space-y-4">
                    <input type="hidden" id="review-prod-id">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Your Rating</label>
                        <div class="flex gap-2 text-3xl" id="review-stars-container">
                            <span class="star-btn active" data-value="1">★</span>
                            <span class="star-btn active" data-value="2">★</span>
                            <span class="star-btn active" data-value="3">★</span>
                            <span class="star-btn active" data-value="4">★</span>
                            <span class="star-btn active" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="review-rating" value="5">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-widest">Your Review</label>
                        <textarea id="review-comment" rows="4" placeholder="How was the quality and fit?" class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-pink-500 outline-none resize-none"></textarea>
                    </div>
                    <button type="submit" class="w-full py-4 bg-pink-500 text-white font-black uppercase tracking-widest rounded-2xl hover:bg-pink-600 transition shadow-lg shadow-pink-200">Submit Review</button>
                </form>
            </div>
        </div>
    </div>
    
    <script>

        function switchTab(tabId) {
            const btnOrders = document.getElementById('tab-orders');
            const btnAddresses = document.getElementById('tab-addresses');
            const secOrders = document.getElementById('section-orders');
            const secAddresses = document.getElementById('section-addresses');
            
            const activeClass = ['bg-pink-50', 'text-pink-600', 'font-bold'];
            const inactiveClass = ['text-gray-500', 'font-medium', 'hover:bg-gray-50'];

            if (tabId === 'orders') {
                btnOrders.classList.add(...activeClass);
                btnOrders.classList.remove(...inactiveClass);
                btnAddresses.classList.remove(...activeClass);
                btnAddresses.classList.add(...inactiveClass);
                
                secOrders.classList.remove('hidden');
                secAddresses.classList.add('hidden');
            } else if (tabId === 'addresses') {
                btnAddresses.classList.add(...activeClass);
                btnAddresses.classList.remove(...inactiveClass);
                btnOrders.classList.remove(...activeClass);
                btnOrders.classList.add(...inactiveClass);
                
                secAddresses.classList.remove('hidden');
                secOrders.classList.add('hidden');
                
                fetchAddresses();
            }
        }

        async function fetchAddresses() {
            try {
                const res = await fetch(`/api/addresses?user_id=${currentUser.id}`);
                const addresses = await res.json();
                const container = document.getElementById('addresses-container');
                
                if (!addresses || addresses.length === 0) {
                    container.innerHTML = `<div class="col-span-2 text-center p-8 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                        <p class="text-gray-500 font-medium">No saved addresses found.</p>
                    </div>`;
                    return;
                }
                
                container.innerHTML = addresses.map(addr => `
                    <div class="border ${addr.is_default ? 'border-pink-300 bg-pink-50/30' : 'border-gray-200'} rounded-2xl p-5 relative group">
                        ${addr.is_default ? '<span class="absolute top-4 right-4 text-[9px] font-black uppercase tracking-widest bg-pink-100 text-pink-600 px-2 py-0.5 rounded">Default</span>' : ''}
                        <h4 class="font-bold text-gray-900 mb-1">${addr.fullname}</h4>
                        <p class="text-xs text-gray-600 leading-relaxed max-w-[80%]">
                            ${addr.house_no}, ${addr.society}<br>
                            ${addr.street ? addr.street + ', ' : ''}${addr.landmark ? addr.landmark + '<br>' : ''}
                            ${addr.city}, ${addr.state} - ${addr.pincode}
                        </p>
                        <p class="text-xs font-bold text-gray-800 mt-3">📞 ${addr.phone}</p>
                        <div class="mt-4 flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="deleteAddress(${addr.id})" class="text-xs text-red-500 font-bold hover:underline">Delete</button>
                        </div>
                    </div>
                `).join('');
                
            } catch (err) {
                console.error(err);
            }
        }

        function openAddressModal() {
            document.getElementById('addressForm').reset();
            document.getElementById('addressModal').classList.remove('hidden');
        }

        function closeAddressModal() {
            document.getElementById('addressModal').classList.add('hidden');
        }

        async function saveAddress(e) {
            e.preventDefault();
            const payload = {
                user_id: currentUser.id,
                first_name: document.getElementById('addr_fname').value,
                last_name: document.getElementById('addr_lname').value,
                phone: document.getElementById('addr_phone').value,
                house_no: document.getElementById('addr_house').value,
                society: document.getElementById('addr_society').value,
                street: document.getElementById('addr_street').value,
                landmark: document.getElementById('addr_landmark').value,
                city: document.getElementById('addr_city').value,
                state: document.getElementById('addr_state').value,
                pincode: document.getElementById('addr_pincode').value,

        function filterOrders(status) {
            try {
                const statusLower = status.toLowerCase();
                document.querySelectorAll('[id^="filter-"]').forEach(el => {
                    el.classList.remove('tab-active', 'text-pink-500');
                    el.classList.add('text-gray-400');
                });
                
                const targetId = `filter-${statusLower}`;
                const targetTab = document.getElementById(targetId);
                if (targetTab) {
                    targetTab.classList.add('tab-active', 'text-pink-500');
                    targetTab.classList.remove('text-gray-400');
                }

                if (status === 'all') filteredOrders = [...allOrders];
                else if (status === 'ongoing') filteredOrders = allOrders.filter(o => o && !['Delivered', 'Cancelled'].includes(o.status));
                else filteredOrders = allOrders.filter(o => o && o.status === status);
                
                renderOrders();
            } catch (err) { console.error(err); }
        }

        function sortOrders(criteria) {
            try {
                if (criteria === 'latest') filteredOrders.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
                if (criteria === 'oldest') filteredOrders.sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0));
                if (criteria === 'total') filteredOrders.sort((a, b) => (b.total_amount || 0) - (a.total_amount || 0));
                renderOrders();
            } catch (err) { console.error(err); }
        }

        function getStatusDisplay(o) {
            if (!o) return 'Unknown';
            const status = o.status || 'Order Placed';
            const date = o.updated_at ? new Date(o.updated_at) : new Date(o.created_at || Date.now());
            const formattedDate = date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
            
            if (status === 'Delivered') return `<span class="text-green-600 font-bold">✅ Delivered on ${formattedDate}</span>`;
            if (status === 'Cancelled') return `<span class="text-red-500 font-bold">🔴 Cancelled on ${formattedDate}</span>`;
            if (['Shipped', 'Out for Delivery'].includes(status)) {
                const estDate = new Date(o.created_at || Date.now());
                estDate.setDate(estDate.getDate() + 3);
                return `<span class="text-blue-600 font-bold">🔵 Arriving by ${estDate.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}</span>`;
            }
            return `<span class="text-orange-500 font-bold">🟡 ${status}</span>`;
        }

                return `<div class="flex flex-col items-center gap-2"><div class="step-node ${isActive ? 'active' : ''}">${isActive ? '✓' : i + 1}</div><div class="text-center"><p class="text-[8px] font-bold ${isActive ? 'text-gray-900' : 'text-gray-300'} uppercase">${s}</p>${entry ? `<p class="text-[7px] text-gray-400">${new Date(entry.updated_at).toLocaleDateString()}</p>` : ''}</div></div>`;
            }).join('');

                            </div>
                        </div>

                        <div class="mt-12 pt-8 border-t border-gray-50 text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em]">Thank you for shopping with Devangi Sewing Products</p>
                        </div>
                    </div>`;
                document.getElementById('invoiceModal').classList.remove('hidden');
            } catch (err) { console.error("Invoice Error:", err); }
        }

        function getStatusColor(status) {
            const colors = { 'Order Placed': 'bg-orange-50 text-orange-600', 'Processing': 'bg-yellow-50 text-yellow-600', 'Shipped': 'bg-blue-50 text-blue-600', 'Out for Delivery': 'bg-purple-50 text-purple-600', 'Delivered': 'bg-green-50 text-green-600', 'Cancelled': 'bg-red-50 text-red-600' };
            return colors[status] || 'bg-gray-50 text-gray-600';
        }

        // --- Review System ---
        async function openReviewModal(prodId, prodName, prodImg) {
            document.getElementById('review-prod-id').value = prodId;
            document.getElementById('review-prod-name').innerText = prodName;
            document.getElementById('review-prod-img').src = prodImg || PLACEHOLDER_IMG;
            document.getElementById('review-comment').value = '';
            setRating(5);
            
            // Fetch existing review
            try {
                const res = await fetch(`/api/reviews/user/${prodId}/${currentUser.id}`);
                const review = await res.json();
                if (review) {
                    setRating(review.rating);
                    document.getElementById('review-comment').value = review.comment || '';
                }
            } catch (e) { console.error(e); }

            document.getElementById('reviewModal').classList.remove('hidden');
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').classList.add('hidden');
        }

        function setRating(val) {
            document.getElementById('review-rating').value = val;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach(s => {
                const sVal = parseInt(s.dataset.value);
                if (sVal <= val) {
                    s.classList.remove('inactive');
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                    s.classList.add('inactive');
                }
            });
        }

        document.querySelectorAll('.star-btn').forEach(btn => {
            btn.onclick = () => setRating(parseInt(btn.dataset.value));
        });

        async function submitReview(e) {
            e.preventDefault();
            const prodId = document.getElementById('review-prod-id').value;
            if (!prodId || prodId === 'null') {
                alert('Invalid product ID. Review cannot be submitted.');
                return;
            }

            const payload = {
                product_id: parseInt(prodId),
                user_id: currentUser.id,
                user_name: currentUser.fullname || 'Anonymous',
                rating: parseInt(document.getElementById('review-rating').value),
                comment: document.getElementById('review-comment').value
            };

            try {
                const res = await fetch('/api/reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    alert('Review submitted successfully! Thank you.');
                    closeReviewModal();
                } else {
                    const err = await res.json();
                    alert(err.error || 'Failed to submit review');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred. Please try again.');
            }
        }

        function logout() { localStorage.removeItem('anon_user'); window.location.href = '/index.html'; }
    </script>
</body>
</html>
