<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews Moderation - Devangi Sewing Store</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden flex h-screen">
    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar (rendered by sidebar.js) -->
    <aside id="admin-sidebar"></aside>

    <div class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block tracking-tight">Reviews Moderation</h1>
            </div>
            <div class="flex items-center gap-2.5">
                <button onclick="adminLogout()" class="text-sm text-gray-500 hover:text-red-600 font-medium transition-colors">Logout</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="flex justify-between items-center mb-6">
                <p class="text-sm text-gray-500">Monitor and moderate product reviews submitted by users</p>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-sm text-gray-500">
                                <th class="p-4 font-medium">Product</th>
                                <th class="p-4 font-medium">User</th>
                                <th class="p-4 font-medium text-center">Rating</th>
                                <th class="p-4 font-medium">Comment</th>
                                <th class="p-4 font-medium">Date</th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reviews-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-5 py-3 rounded-lg shadow-xl z-50 flex items-center gap-2">
        <span id="toast-msg"></span>
    </div>

    <script src="/admin/js/sidebar.js?v=2"></script>
    <script src="/admin/js/admin.js?v=3"></script>
    <script>
        function adminLogout() { 
            fetch('/api/admin/logout', {method:'POST'}).then(() => window.location.href = '/admin/login.html'); 
        }

        document.addEventListener('DOMContentLoaded', loadReviews);

        async function loadReviews() {
            const tbody = document.getElementById('reviews-table-body');
            try {
                const res = await fetch('/api/admin/reviews');
                if (res.status === 401) {
                    window.location.href = '/admin/login.html';
                    return;
                }
                const reviews = await res.json();
                tbody.innerHTML = '';

                if (!reviews.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-400">No reviews submitted yet.</td></tr>';
                    return;
                }

                reviews.forEach(r => {
                    // Create stars HTML
                    const rating = parseFloat(r.rating) || 5;
                    let starsHtml = '';
                    for (let i = 1; i <= 5; i++) {
                        if (rating >= i) {
                            starsHtml += '★';
                        } else {
                            starsHtml += '☆';
                        }
                    }

                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-gray-50 hover:bg-gray-50 transition-colors';
                    tr.innerHTML = `
                        <td class="p-4">
                            <span class="font-medium text-gray-900">${r.product_title || 'Unknown Product'}</span>
                            <span class="block text-xs text-gray-400">ID: ${r.product_id}</span>
                        </td>
                        <td class="p-4">
                            <span class="font-medium text-gray-700">${r.user_name}</span>
                            ${r.user_id ? `<span class="block text-xs text-gray-400">UID: ${r.user_id}</span>` : '<span class="block text-xs text-gray-400">Guest</span>'}
                        </td>
                        <td class="p-4 text-center">
                            <span class="text-amber-500 font-bold tracking-wider" title="${rating}/5">${starsHtml}</span>
                        </td>
                        <td class="p-4 text-gray-600 max-w-xs break-words">
                            ${r.comment || '<span class="text-gray-400 italic">No comment provided</span>'}
                        </td>
                        <td class="p-4 text-xs text-gray-400">
                            ${r.created_at ? new Date(r.created_at).toLocaleString() : 'N/A'}
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="deleteReview(${r.id})" class="p-1.5 text-red-500 hover:bg-red-50 rounded transition-colors text-xs font-medium">Delete</button>
                        </td>`;
                    tbody.appendChild(tr);
                });
            } catch (err) { 
                console.error(err); 
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-red-500">Failed to load reviews.</td></tr>';
            }
        }

        async function deleteReview(id) {
            if (!confirm('Are you sure you want to delete this review? This action cannot be undone.')) return;
            try {
                const res = await fetch('/api/admin/reviews/' + id, { method: 'DELETE' });
                if (res.ok) {
                    loadReviews(); 
                    showToast('Review deleted successfully 🗑️');
                } else {
                    const data = await res.json();
                    alert('Error: ' + (data.error || 'Failed to delete review'));
                }
            } catch (err) { 
                console.error(err);
                alert('Network error while deleting review');
            }
        }

        // Helper to show custom toasts matching admin.js toast if needed
        function showToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            if (!toast || !toastMsg) return;
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
