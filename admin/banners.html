<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Hero Banners - Devangi Products</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Cropper.js for banner image cropping -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
    
        /* Custom Scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>

<body class="text-gray-800 antialiased overflow-hidden flex h-screen">
<!-- Mobile Overlay -->
    <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar (rendered by sidebar.js) -->
    <aside id="admin-sidebar"></aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block tracking-tight">Store Banners</h1>
                
            </div>
            
            <div class="flex items-center gap-3 sm:gap-5">
                <div class="relative hidden lg:block">
                    <button onclick="triggerGlobalSearch()" class="absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-pink-500 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </button>
                    <input type="text" id="global-search" onkeypress="if(event.key === 'Enter') triggerGlobalSearch()" placeholder="Search orders, products..." class="pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-sm focus:bg-white focus:border-pink-500 focus:ring-2 focus:ring-pink-100 transition-all w-64 outline-none text-gray-700 placeholder-gray-400">
                </div>
                
                <button class="relative p-2 text-gray-400 hover:text-pink-600 transition-colors hover:bg-pink-50 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-pink-500 rounded-full border-2 border-white"></span>
                </button>
                
                <div class="h-6 w-px bg-gray-200 hidden sm:block"></div>
                
                <div class="flex items-center gap-2.5 pl-1 sm:pl-0 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=fce7f3&color=db2777&bold=true" alt="Admin" class="w-8 h-8 rounded-full border border-gray-200 shadow-sm">
                    <div class="hidden sm:block text-left">
                        <p class="text-sm font-bold text-gray-800 leading-tight">Admin User</p>
                        <p class="text-[11px] text-gray-500 font-medium">Store Owner</p>
                    </div>
                    <svg class="w-4 h-4 text-gray-400 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </header>
        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scrollbar">

            <div id="section-banners">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-2xl font-bold">Manage Hero Banners</h1>
                    <button onclick="toggleModal('addBannerModal')"
                        class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-lg shadow transition-colors font-medium">
                        + Add New Banner
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-sm text-gray-500">
                                <th class="p-4 font-medium">Desktop Image</th>
                                <th class="p-4 font-medium">Mobile Image</th>
                                <th class="p-4 font-medium">Content / Offer</th>
                                <th class="p-4 font-medium">Button / Redirect Link</th>
                                <th class="p-4 font-medium text-center">Order</th>
                                <th class="p-4 font-medium text-center">Status</th>
                                <th class="p-4 font-medium">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="banners-table-body" class="text-sm">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Banner Modal -->
    <div id="addBannerModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 class="text-xl font-bold">Add New Banner</h3>
                <button onclick="toggleModal('addBannerModal')" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="addBannerForm" class="p-6 space-y-4 max-h-[75vh] overflow-y-auto custom-scrollbar">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Banner Title (Optional)</label>
                    <input type="text" name="title" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Subtitle (Optional)</label>
                    <input type="text" name="subtitle" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Offer Text (Optional)</label>
                    <input type="text" name="offer_text" placeholder="e.g. starting at Rs. 200" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Button Text (Optional)</label>
                        <input type="text" name="button_text" value="Shop Now" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Order</label>
                        <input type="number" name="sort_order" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Redirect Link (URL)</label>
                    <input type="text" name="link_url" value="/shop.html" placeholder="e.g. /shop.html or full URL" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Desktop Image <span class="text-red-500">*</span></label>
                        <input type="file" id="add_image_input" name="image" accept="image/*" required class="w-full text-sm text-gray-500">
                        <div class="mt-2 hidden" id="add_image_preview_container">
                            <img id="add_image_preview" class="w-32 h-16 object-cover rounded border border-gray-200 shadow-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Image (Optional)</label>
                        <input type="file" id="add_mobile_image_input" name="mobile_image" accept="image/*" class="w-full text-sm text-gray-500">
                        <div class="mt-2 hidden" id="add_mobile_image_preview_container">
                            <img id="add_mobile_image_preview" class="w-32 h-24 object-cover rounded border border-gray-200 shadow-sm">
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-6 pt-2">
                    <label class="flex items-center text-sm font-medium text-gray-700 cursor-pointer select-none">
                        <input type="checkbox" name="status" checked value="1" class="w-4 h-4 text-pink-600 border-gray-300 rounded focus:ring-pink-500 mr-2">
                        Status (Active)
                    </label>
                    <label class="flex items-center text-sm font-medium text-gray-700 cursor-pointer select-none">
                        <input type="checkbox" name="open_new_tab" value="1" class="w-4 h-4 text-pink-600 border-gray-300 rounded focus:ring-pink-500 mr-2">
                        Open in New Tab
                    </label>
                </div>
                <div class="pt-4 flex justify-end space-x-3 border-t border-gray-100">
                    <button type="button" onclick="toggleModal('addBannerModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-lg shadow font-medium">Save Banner</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Banner Modal -->
    <div id="editBannerModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 class="text-xl font-bold">Edit Banner</h3>
                <button onclick="toggleModal('editBannerModal')" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="editBannerForm" class="p-6 space-y-4 max-h-[75vh] overflow-y-auto custom-scrollbar">
                <input type="hidden" id="edit_banner_id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Banner Title (Optional)</label>
                    <input type="text" id="edit_banner_title" name="title" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Subtitle (Optional)</label>
                    <input type="text" id="edit_banner_subtitle" name="subtitle" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Offer Text (Optional)</label>
                    <input type="text" id="edit_banner_offer_text" name="offer_text" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Button Text (Optional)</label>
                        <input type="text" id="edit_banner_button_text" name="button_text" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Order</label>
                        <input type="number" id="edit_banner_sort_order" name="sort_order" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Redirect Link (URL)</label>
                    <input type="text" id="edit_banner_link_url" name="link_url" placeholder="e.g. /shop.html or full URL" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Update Desktop Image</label>
                        <input type="file" id="edit_image_input" name="image" accept="image/*" class="w-full text-sm text-gray-500">
                        <div class="mt-2 hidden" id="edit_image_preview_container">
                            <img id="edit_image_preview" class="w-32 h-16 object-cover rounded border border-gray-200 shadow-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Update Mobile Image</label>
                        <input type="file" id="edit_mobile_image_input" name="mobile_image" accept="image/*" class="w-full text-sm text-gray-500">
                        <div class="mt-2 hidden" id="edit_mobile_image_preview_container">
                            <img id="edit_mobile_image_preview" class="w-32 h-24 object-cover rounded border border-gray-200 shadow-sm">
                        </div>
                    </div>
                </div>
                <div class="flex flex-col space-y-2 pt-2">
                    <div class="flex items-center space-x-6">
                        <label class="flex items-center text-sm font-medium text-gray-700 cursor-pointer select-none">
                            <input type="checkbox" id="edit_banner_status" name="status" value="1" class="w-4 h-4 text-pink-600 border-gray-300 rounded focus:ring-pink-500 mr-2">
                            Status (Active)
                        </label>
                        <label class="flex items-center text-sm font-medium text-gray-700 cursor-pointer select-none">
                            <input type="checkbox" id="edit_banner_open_new_tab" name="open_new_tab" value="1" class="w-4 h-4 text-pink-600 border-gray-300 rounded focus:ring-pink-500 mr-2">
                            Open in New Tab
                        </label>
                    </div>
                    <label id="remove_mobile_image_container" class="flex items-center text-sm font-medium text-gray-700 cursor-pointer select-none pt-2 hidden">
                        <input type="checkbox" id="edit_banner_remove_mobile" name="remove_mobile_image" value="1" class="w-4 h-4 text-pink-600 border-gray-300 rounded focus:ring-pink-500 mr-2">
                        Remove Mobile Image (fallback to Desktop)
                    </label>
                </div>
                <div class="pt-4 flex justify-end space-x-3 border-t border-gray-100">
                    <button type="button" onclick="toggleModal('editBannerModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-lg shadow font-medium">Update Banner</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Cropper Modal -->
    <div id="cropperModal" class="fixed inset-0 bg-black/80 hidden flex-col items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl flex flex-col h-[85vh]">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 shrink-0">
                <h3 class="text-lg font-bold text-gray-800">Crop Banner Image</h3>
                <button type="button" onclick="closeCropperModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Cropper Workspace -->
            <div class="flex-1 min-h-0 bg-gray-900 flex items-center justify-center p-4">
                <img id="cropper-image" class="max-h-full max-w-full hidden">
            </div>
            
            <!-- Cropper Controls -->
            <div class="p-4 bg-gray-50 border-t border-gray-100 shrink-0 flex flex-col sm:flex-row gap-4 justify-between items-center">
                <div class="flex flex-wrap gap-2 justify-center">
                    <button type="button" onclick="setCropAspectRatio(2.66)" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-xs font-semibold text-gray-700 hover:bg-gray-50 focus:ring-2 focus:ring-pink-500">Desktop (8:3)</button>
                    <button type="button" onclick="setCropAspectRatio(1.33)" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-xs font-semibold text-gray-700 hover:bg-gray-50 focus:ring-2 focus:ring-pink-500">Mobile (4:3)</button>
                    <button type="button" onclick="setCropAspectRatio(1)" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-xs font-semibold text-gray-700 hover:bg-gray-50 focus:ring-2 focus:ring-pink-500">Square (1:1)</button>
                    <button type="button" onclick="setCropAspectRatio(1.77)" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-xs font-semibold text-gray-700 hover:bg-gray-50 focus:ring-2 focus:ring-pink-500">Widescreen (16:9)</button>
                    <button type="button" onclick="setCropAspectRatio(NaN)" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-xs font-semibold text-gray-700 hover:bg-gray-50 focus:ring-2 focus:ring-pink-500">Freeform</button>
                </div>
                
                <div class="flex gap-2">
                    <button type="button" onclick="closeCropperModal()" class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium text-sm">Cancel</button>
                    <button type="button" onclick="applyCrop()" class="px-5 py-2 bg-pink-500 hover:bg-pink-600 text-white rounded-lg shadow font-medium text-sm">Crop & Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/admin/js/sidebar.js"></script>
    <script src="/admin/js/admin.js"></script>
</body>
</html>
