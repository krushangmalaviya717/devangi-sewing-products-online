<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Contact & Settings - Devangi Sewing Store</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    
        /* Custom Scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>

<body class="text-gray-800 antialiased overflow-hidden flex h-screen">
<!-- Mobile Overlay -->
    <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar (rendered by sidebar.js) -->
    <aside id="admin-sidebar"></aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block tracking-tight">Contact Settings</h1>
                
            </div>
            
            <div class="flex items-center gap-3 sm:gap-5">
                <div class="relative hidden lg:block">
                    <svg class="w-4 h-4 absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" placeholder="Search orders, products..." class="pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-sm focus:bg-white focus:border-pink-500 focus:ring-2 focus:ring-pink-100 transition-all w-64 outline-none text-gray-700 placeholder-gray-400">
                </div>
                
                <button class="relative p-2 text-gray-400 hover:text-pink-600 transition-colors hover:bg-pink-50 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-pink-500 rounded-full border-2 border-white"></span>
                </button>
                
                <div class="h-6 w-px bg-gray-200 hidden sm:block"></div>
                
                <div class="flex items-center gap-2.5 pl-1 sm:pl-0 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=fce7f3&color=db2777&bold=true" alt="Admin" class="w-8 h-8 rounded-full border border-gray-200 shadow-sm">
                    <div class="hidden sm:block text-left">
                        <p class="text-sm font-bold text-gray-800 leading-tight">Admin User</p>
                        <p class="text-[11px] text-gray-500 font-medium">Store Owner</p>
                    </div>
                    <svg class="w-4 h-4 text-gray-400 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </header>
        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scrollbar">


            <h1 class="text-3xl font-bold mb-8">Contact Form & Settings</h1>
            
            <!-- Tabs -->
            <div class="mb-6 border-b border-gray-200">
                <nav class="flex gap-4">
                    <button id="tab-queries" onclick="switchTab('queries')" class="px-4 py-2 text-pink-600 border-b-2 border-pink-600 font-medium">User Queries</button>
                    <button id="tab-settings" onclick="switchTab('settings')" class="px-4 py-2 text-gray-500 hover:text-gray-700 font-medium border-b-2 border-transparent">Store Settings</button>
                </nav>
            </div>

            <!-- Queries Section -->
            <div id="section-queries">
                <div class="flex flex-wrap gap-3 mb-6">
                    <select id="query-status-filter" onchange="fetchQueries()" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
                        <option value="">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="Resolved">Resolved</option>
                    </select>

                    <select id="query-month-filter" onchange="fetchQueries()" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
                        <option value="">Month</option>
                        <option value="01">Jan</option>
                        <option value="02">Feb</option>
                        <option value="03">Mar</option>
                        <option value="04">Apr</option>
                        <option value="05">May</option>
                        <option value="06">Jun</option>
                        <option value="07">Jul</option>
                        <option value="08">Aug</option>
                        <option value="09">Sep</option>
                        <option value="10">Oct</option>
                        <option value="11">Nov</option>
                        <option value="12">Dec</option>
                    </select>

                    <select id="query-year-filter" onchange="fetchQueries()" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
                        <option value="">Year</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-sm text-gray-500">
                                <th class="p-4 font-medium">ID</th>
                                <th class="p-4 font-medium">Name & Email</th>
                                <th class="p-4 font-medium">Topics</th>
                                <th class="p-4 font-medium">Message</th>
                                <th class="p-4 font-medium">Status</th>
                                <th class="p-4 font-medium text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="queries-table-body" class="text-sm">
                            <!-- Queries will be appended here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Settings Section -->
            <div id="section-settings" class="hidden">
                <form id="settingsForm" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-6">
                    <h2 class="text-xl font-semibold mb-4">Store Contact Info</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Store Location</label>
                            <input type="text" id="setting_location" name="store_location" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                            <input type="text" id="setting_phone" name="store_phone" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                            <input type="email" id="setting_email" name="store_email" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 outline-none" required>
                        </div>
                    </div>
                    
                    <hr class="border-gray-100 my-6">
                    
                    <h2 class="text-xl font-semibold mb-4">Contact Form Dropdowns</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Order Status Options (Comma separated)</label>
                            <textarea id="setting_order_status" name="order_status" rows="3" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 outline-none" required></textarea>
                            <p class="text-xs text-gray-500 mt-1">E.g., Pending, Shipped, Delivered</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Related Options (Comma separated)</label>
                            <textarea id="setting_delivery_related" name="delivery_related" rows="3" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 outline-none" required></textarea>
                            <p class="text-xs text-gray-500 mt-1">E.g., Delay in Delivery, Change Address, Other</p>
                        </div>
                    </div>

                    <div class="flex justify-end pt-4">
                        <button type="submit" class="bg-pink-600 hover:bg-pink-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">
                            Save Settings
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Modal for viewing query message fully -->
    <div id="queryModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6 relative">
            <button type="button" onclick="toggleModal('queryModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">✕</button>
            <h3 class="text-xl font-bold mb-4">Message Details</h3>
            <div id="queryModalContent" class="text-gray-700 bg-gray-50 p-4 rounded-lg whitespace-pre-wrap max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <script src="/admin/js/sidebar.js"></script>
    <script src="/admin/js/admin.js"></script>
    <script src="/admin/js/contact.js"></script>
</body>
</html>
