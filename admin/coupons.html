<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupons - Devangi Sewing Store</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden flex h-screen">
    <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>
    <!-- Sidebar (rendered by sidebar.js) -->
    <aside id="admin-sidebar"></aside>

    <div class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block tracking-tight">Coupon Management</h1>
            </div>
            <div class="flex items-center gap-2.5">
                <button onclick="adminLogout()" class="text-sm text-gray-500 hover:text-red-600 font-medium transition-colors">Logout</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="flex justify-between items-center mb-6">
                <p class="text-sm text-gray-500">Create and manage discount coupons for your store</p>
                <button onclick="toggleModal('addCouponModal')" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-lg shadow transition-colors font-medium text-sm">+ Create Coupon</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-sm text-gray-500">
                                <th class="p-4 font-medium">Code</th>
                                <th class="p-4 font-medium">Type</th>
                                <th class="p-4 font-medium">Value</th>
                                <th class="p-4 font-medium">Min Order</th>
                                <th class="p-4 font-medium text-center">Usage</th>
                                <th class="p-4 font-medium text-center">Status</th>
                                <th class="p-4 font-medium">Expires</th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="coupons-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Coupon Modal -->
    <div id="addCouponModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold">Create New Coupon</h3>
                <button onclick="toggleModal('addCouponModal')" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            <form id="addCouponForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Coupon Code *</label>
                        <input type="text" id="coupon_code" required placeholder="e.g. WELCOME10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 uppercase text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Discount Type</label>
                        <select id="coupon_type" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="percentage">Percentage (%)</option>
                            <option value="flat">Flat Amount (Rs.)</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Value *</label>
                        <input type="number" id="coupon_value" required step="0.01" placeholder="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Min Order (Rs.)</label>
                        <input type="number" id="coupon_min_order" step="0.01" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Max Discount</label>
                        <input type="number" id="coupon_max_discount" step="0.01" value="0" placeholder="0 = no limit" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Usage Limit</label>
                        <input type="number" id="coupon_usage_limit" value="0" placeholder="0 = unlimited" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
                        <input type="date" id="coupon_expires" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t">
                    <button type="button" onclick="toggleModal('addCouponModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm">Cancel</button>
                    <button type="submit" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-lg font-medium text-sm">Create Coupon</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/admin/js/sidebar.js?v=2"></script>
    <script src="/admin/js/admin.js?v=2"></script>
    <script>
        function adminLogout() { fetch('/api/admin/logout', {method:'POST'}).then(() => window.location.href = '/admin/login.html'); }

        document.addEventListener('DOMContentLoaded', loadCoupons);

        async function loadCoupons() {
            const tbody = document.getElementById('coupons-table-body');
            try {
                const res = await fetch('/api/admin/coupons');
                const coupons = await res.json();
                tbody.innerHTML = '';

                if (!coupons.length) {
                    tbody.innerHTML = '<tr><td colspan="8" class="p-8 text-center text-gray-400">No coupons yet. Click "Create Coupon" to get started!</td></tr>';
                    return;
                }

                coupons.forEach(c => {
                    const isExpired = c.expires_at && new Date(c.expires_at) < new Date();
                    const statusClass = !c.is_active || isExpired ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700';
                    const statusText = !c.is_active ? 'Disabled' : (isExpired ? 'Expired' : 'Active');

                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-gray-50 hover:bg-gray-50 transition-colors';
                    tr.innerHTML = `
                        <td class="p-4 font-bold text-pink-600 tracking-wider">${c.code}</td>
                        <td class="p-4 text-gray-600">${c.type === 'percentage' ? 'Percentage' : 'Flat'}</td>
                        <td class="p-4 font-medium">${c.type === 'percentage' ? c.value + '%' : 'Rs.' + c.value}</td>
                        <td class="p-4 text-gray-500">${c.min_order > 0 ? 'Rs.' + c.min_order : '—'}</td>
                        <td class="p-4 text-center"><span class="px-2 py-0.5 bg-gray-100 rounded text-xs font-medium">${c.used_count}${c.usage_limit > 0 ? '/' + c.usage_limit : '/∞'}</span></td>
                        <td class="p-4 text-center"><span class="px-2 py-0.5 rounded-full text-xs font-bold ${statusClass}">${statusText}</span></td>
                        <td class="p-4 text-xs text-gray-400">${c.expires_at ? new Date(c.expires_at).toLocaleDateString() : 'Never'}</td>
                        <td class="p-4 text-right">
                            <button onclick="toggleCouponStatus(${c.id}, ${c.is_active})" class="p-1.5 ${c.is_active ? 'text-orange-500 hover:bg-orange-50' : 'text-green-500 hover:bg-green-50'} rounded transition-colors text-xs font-medium" title="${c.is_active ? 'Disable' : 'Enable'}">${c.is_active ? 'Disable' : 'Enable'}</button>
                            <button onclick="deleteCoupon(${c.id})" class="p-1.5 text-red-500 hover:bg-red-50 rounded transition-colors text-xs font-medium">Delete</button>
                        </td>`;
                    tbody.appendChild(tr);
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById('addCouponForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/admin/coupons', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: document.getElementById('coupon_code').value,
                        type: document.getElementById('coupon_type').value,
                        value: parseFloat(document.getElementById('coupon_value').value),
                        min_order: parseFloat(document.getElementById('coupon_min_order').value) || 0,
                        max_discount: parseFloat(document.getElementById('coupon_max_discount').value) || 0,
                        usage_limit: parseInt(document.getElementById('coupon_usage_limit').value) || 0,
                        expires_at: document.getElementById('coupon_expires').value || null
                    })
                });
                const data = await res.json();
                if (res.ok) { toggleModal('addCouponModal'); document.getElementById('addCouponForm').reset(); loadCoupons(); showToast('Coupon created! 🎟️'); }
                else alert('Error: ' + data.error);
            } catch (err) { alert('Failed to create coupon'); }
        });

        async function toggleCouponStatus(id, currentStatus) {
            try {
                const res = await fetch('/api/admin/coupons/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: 'X', type: 'percentage', value: 0, is_active: !currentStatus })
                });
                // Re-fetch to get actual data
                loadCoupons();
            } catch (err) { console.error(err); }
        }

        async function deleteCoupon(id) {
            if (!confirm('Delete this coupon?')) return;
            await fetch('/api/admin/coupons/' + id, { method: 'DELETE' });
            loadCoupons(); showToast('Coupon deleted');
        }
    </script>
</body>
</html>
