<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - Devangi Sewing Store</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    
        /* Custom Scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>

<body class="text-gray-800 antialiased overflow-hidden flex h-screen">
<!-- Mobile Overlay -->
    <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar (rendered by sidebar.js) -->
    <aside id="admin-sidebar"></aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block tracking-tight">Categories</h1>
                
            </div>
            
            <div class="flex items-center gap-3 sm:gap-5">
                <div class="relative hidden lg:block">
                    <svg class="w-4 h-4 absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" placeholder="Search orders, products..." class="pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-sm focus:bg-white focus:border-pink-500 focus:ring-2 focus:ring-pink-100 transition-all w-64 outline-none text-gray-700 placeholder-gray-400">
                </div>
                
                <button class="relative p-2 text-gray-400 hover:text-pink-600 transition-colors hover:bg-pink-50 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-pink-500 rounded-full border-2 border-white"></span>
                </button>
                
                <div class="h-6 w-px bg-gray-200 hidden sm:block"></div>
                
                <div class="flex items-center gap-2.5 pl-1 sm:pl-0 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=fce7f3&color=db2777&bold=true" alt="Admin" class="w-8 h-8 rounded-full border border-gray-200 shadow-sm">
                    <div class="hidden sm:block text-left">
                        <p class="text-sm font-bold text-gray-800 leading-tight">Admin User</p>
                        <p class="text-[11px] text-gray-500 font-medium">Store Owner</p>
                    </div>
                    <svg class="w-4 h-4 text-gray-400 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </header>
        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scrollbar">

            <div id="section-categories">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-bold">Manage Categories</h1>
                        <p class="text-sm text-gray-400 mt-1">Categories are used across the whole website.</p>
                    </div>
                    <button onclick="toggleModal('addCategoryModal')"
                        class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-lg shadow transition-colors font-medium">
                        + Add Category
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-sm text-gray-500">
                                <th class="p-4 font-medium w-16">Icon</th>
                                <th class="p-4 font-medium">Category Name</th>
                                <th class="p-4 font-medium text-center">Products</th>
                                <th class="p-4 font-medium">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categories-table-body" class="text-sm">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Category Modal -->
    <div id="addCategoryModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 class="text-xl font-bold">Add Category</h3>
                <button onclick="toggleModal('addCategoryModal')" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="addCategoryForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category Name <span class="text-red-500">*</span></label>
                    <input type="text" id="cat_name" name="name" required placeholder="e.g. Dupatta" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Icon (1:1 Image)</label>
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 border rounded bg-gray-50 flex items-center justify-center overflow-hidden shrink-0">
                            <img id="add_cat_icon_preview" src="" style="display:none;" class="w-full h-full object-cover">
                            <span id="add_cat_icon_placeholder" class="text-2xl text-gray-400">🏷️</span>
                        </div>
                        <input type="hidden" id="cat_icon" name="icon" value="🏷️">
                        <input type="file" id="add_cat_file" accept="image/*" class="hidden" onchange="uploadCategoryIcon('add')">
                        <button type="button" onclick="document.getElementById('add_cat_file').click()" class="bg-white border text-gray-700 px-3 py-1.5 rounded text-sm hover:bg-gray-50 cursor-pointer">Upload Photo</button>
                    </div>
                </div>
                <div class="pt-2 flex justify-end space-x-3 border-t border-gray-100">
                    <button type="button" onclick="toggleModal('addCategoryModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-lg shadow font-medium">Save Category</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Category Modal -->
    <div id="editCategoryModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 class="text-xl font-bold">Edit Category</h3>
                <button onclick="toggleModal('editCategoryModal')" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="editCategoryForm" class="p-6 space-y-4">
                <input type="hidden" id="edit_cat_id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category Name <span class="text-red-500">*</span></label>
                    <input type="text" id="edit_cat_name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Icon (1:1 Image)</label>
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 border rounded bg-gray-50 flex items-center justify-center overflow-hidden shrink-0">
                            <img id="edit_cat_icon_preview" src="" style="display:none;" class="w-full h-full object-cover">
                            <span id="edit_cat_icon_placeholder" class="text-2xl text-gray-400">🏷️</span>
                        </div>
                        <input type="hidden" id="edit_cat_icon">
                        <input type="file" id="edit_cat_file" accept="image/*" class="hidden" onchange="uploadCategoryIcon('edit')">
                        <button type="button" onclick="document.getElementById('edit_cat_file').click()" class="bg-white border text-gray-700 px-3 py-1.5 rounded text-sm hover:bg-gray-50 cursor-pointer">Upload Photo</button>
                    </div>
                </div>
                <div class="pt-2 flex justify-end space-x-3 border-t border-gray-100">
                    <button type="button" onclick="toggleModal('editCategoryModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-lg shadow font-medium">Update Category</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/admin/js/sidebar.js?v=2"></script>
    <script src="/admin/js/admin.js?v=3"></script>
</body>
</html>
