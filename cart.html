<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Devangi Products</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/index.html"><img src="/assets/images/logo/logo.svg" alt="Devangi Products Logo" class="h-8"></a>
            <div class="flex space-x-6 items-center">
                <a href="/login.html" class="text-gray-600 hover:text-pink-500 transition font-medium">Account</a>
                <a href="/cart.html" class="text-pink-500 font-medium whitespace-nowrap">
                    Cart (<span id="cart-nav-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-10 max-w-5xl">
        <h1 class="text-3xl font-bold mb-8 text-gray-900 border-b pb-4">Your Shopping Cart</h1>

        <div class="flex flex-col lg:flex-row gap-8" id="cart-wrapper">
            <!-- Cart Items -->
            <div class="flex-grow bg-white rounded-2xl shadow-sm border border-gray-100 p-6" id="cart-container">
                <!-- Injected via JS -->
                <p class="text-center py-10 text-gray-400 font-medium">Loading your cart...</p>
            </div>

            <!-- Order Summary -->
            <div class="w-full lg:w-1/3" id="order-summary-container">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-24">
                    <h3 class="text-xl font-bold mb-4 border-b pb-2">Order Summary</h3>
                    
                    <!-- Free Shipping Progress / Notice -->
                    <div id="free-shipping-notice" class="mb-4 p-3 bg-pink-50 border border-pink-100 rounded-xl text-xs text-pink-700 font-medium text-center transition-all hidden">
                        Add <span class="font-bold text-pink-600" id="free-shipping-diff">Rs. 50.00</span> more for <span class="font-bold text-pink-600">FREE Shipping!</span>
                    </div>

                    <div class="flex justify-between mb-3 text-gray-600">
                        <span>Subtotal</span>
                        <span id="subtotal-display">Rs. 0.00</span>
                    </div>
                    <div class="flex justify-between mb-4 text-gray-600">
                        <span>Shipping</span>
                        <span id="shipping-display" class="text-green-500 font-medium">Free</span>
                    </div>
                    
                    <div class="flex justify-between mb-6 text-xl font-bold border-t pt-4">
                        <span>Total</span>
                        <span id="total-display" class="text-pink-500">Rs. 0.00</span>
                    </div>
                    
                    <div id="min-order-notice" class="hidden bg-yellow-50 border border-yellow-200 text-yellow-800 text-sm p-4 rounded-xl mb-4 text-center">
                    </div>
                    
                    <a id="checkout-btn" href="/checkout.html" class="block w-full text-center bg-gray-900 text-white font-semibold py-3 rounded-xl hover:bg-pink-500 transition duration-300">
                        Proceed to Checkout
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        let shippingCharge = 50;
        let shippingFreeAbove = 250;
        let minimumOrderAmount = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadShippingSettings();
            renderCart();
        });

        async function loadShippingSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                shippingCharge = parseFloat(settings.shipping_default_charge) || 50;
                shippingFreeAbove = parseFloat(settings.shipping_free_above) || 250;
                minimumOrderAmount = parseFloat(settings.minimum_order_amount) || 0;
            } catch (err) { /* use defaults */ }
        }

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('anon_cart')) || [];
            const container = document.getElementById('cart-container');
            const summaryContainer = document.getElementById('order-summary-container');
            const cartWrapper = document.getElementById('cart-wrapper');
            
            const totalItems = cart.reduce((acc, c) => acc + c.quantity, 0);
            document.getElementById('cart-nav-count').innerText = totalItems;

            if(cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16">
                        <img src="/assets/images/empty_cart.png" class="mx-auto h-48 mb-6" alt="Empty Cart">
                        <h2 class="text-2xl font-semibold mb-2">Your cart is empty</h2>
                        <p class="text-gray-500 mb-6">Looks like you haven't added anything to your cart yet.</p>
                        <a href="/index.html" class="inline-block bg-pink-500 text-white px-8 py-3 rounded-xl font-semibold hover:bg-pink-600 transition shadow-lg shadow-pink-200">Shop Now</a>
                    </div>
                `;
                if (summaryContainer) summaryContainer.classList.add('hidden');
                if (cartWrapper) cartWrapper.classList.remove('lg:flex-row');
                return;
            }

            if (summaryContainer) summaryContainer.classList.remove('hidden');
            if (cartWrapper) cartWrapper.classList.add('lg:flex-row');

            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                html += `
                    <div class="flex items-center gap-4 py-6 border-b border-gray-100 last:border-0 last:pb-0 relative animate-fade-in">
                        <a href="/product.html?id=${item.id}" class="block shrink-0">
                            <img src="${item.image}" alt="${item.title}" class="w-24 h-24 object-cover rounded-xl border border-gray-100 shadow-sm hover:opacity-80 transition duration-200">
                        </a>
                        <div class="flex-grow">
                            <h4 class="font-semibold text-lg text-gray-800 leading-tight hover:text-pink-500 transition-colors duration-200">
                                <a href="/product.html?id=${item.id}">${item.title}</a>
                            </h4>
                            <p class="text-pink-500 font-bold mt-1">Rs. ${parseFloat(item.price).toFixed(2)}</p>
                            
                            <div class="flex items-center mt-4 bg-gray-50 inline-flex rounded-lg border border-gray-200">
                                <button onclick="updateQty(${index}, -1)" class="w-8 h-8 flex justify-center items-center text-gray-500 hover:text-pink-500 hover:bg-pink-50 transition">-</button>
                                <span class="w-10 text-center text-sm font-bold text-gray-700">${item.quantity}</span>
                                <button onclick="updateQty(${index}, 1)" class="w-8 h-8 flex justify-center items-center text-gray-500 hover:text-pink-500 hover:bg-pink-50 transition">+</button>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <p class="font-bold text-lg hidden md:block mb-2 text-gray-900">Rs. ${itemTotal.toFixed(2)}</p>
                            <button onclick="removeItem(${index})" class="flex items-center gap-1 text-red-400 hover:text-red-600 text-sm font-medium transition group">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                                Remove
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('subtotal-display').innerText = 'Rs. ' + total.toFixed(2);
            
            // Shipping calculation
            const actualShipping = total >= shippingFreeAbove ? 0 : shippingCharge;
            const shippingEl = document.getElementById('shipping-display');
            if (shippingEl) {
                if (actualShipping > 0) {
                    shippingEl.innerText = 'Rs. ' + actualShipping.toFixed(2);
                    shippingEl.className = 'text-gray-700 font-medium';
                } else {
                    shippingEl.innerText = 'Free';
                    shippingEl.className = 'text-green-500 font-bold';
                }
            }

            // Free Shipping Notice Progress
            const fsNotice = document.getElementById('free-shipping-notice');
            if (fsNotice) {
                if (actualShipping > 0 && total < shippingFreeAbove) {
                    const diff = shippingFreeAbove - total;
                    document.getElementById('free-shipping-diff').textContent = `Rs. ${diff.toFixed(2)}`;
                    fsNotice.classList.remove('hidden');
                } else {
                    fsNotice.classList.add('hidden');
                }
            }

            const grandTotal = total + actualShipping;
            document.getElementById('total-display').innerText = 'Rs. ' + grandTotal.toFixed(2);

            // Minimum order validation
            const checkoutBtn = document.getElementById('checkout-btn');
            const minOrderNotice = document.getElementById('min-order-notice');
            
            if (total < minimumOrderAmount) {
                if (checkoutBtn) {
                    checkoutBtn.removeAttribute('href');
                    checkoutBtn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                }
                if (minOrderNotice) {
                    minOrderNotice.innerHTML = `⚠️ Minimum order amount is <strong>Rs. ${minimumOrderAmount.toFixed(2)}</strong>. You need <strong>Rs. ${(minimumOrderAmount - total).toFixed(2)}</strong> more to place an order.`;
                    minOrderNotice.classList.remove('hidden');
                }
            } else {
                if (checkoutBtn) {
                    checkoutBtn.setAttribute('href', '/checkout.html');
                    checkoutBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                }
                if (minOrderNotice) {
                    minOrderNotice.classList.add('hidden');
                }
            }
        }

        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('anon_cart')) || [];
            if(cart[index]) {
                cart[index].quantity += change;
                if(cart[index].quantity <= 0) cart.splice(index, 1);
                localStorage.setItem('anon_cart', JSON.stringify(cart));
                renderCart();
            }
        }

        function removeItem(index) {
            if (confirm('Are you sure you want to remove this item?')) {
                let cart = JSON.parse(localStorage.getItem('anon_cart')) || [];
                cart.splice(index, 1);
                localStorage.setItem('anon_cart', JSON.stringify(cart));
                renderCart();
            }
        }
    </script>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.3s ease forwards;
        }
    </style>
</body>
</html>
