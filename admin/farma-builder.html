<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farma Form Builder - Devangi Products</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

<body class="text-gray-800 antialiased overflow-hidden flex h-screen">

    <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

    <aside id="admin-sidebar"></aside>

    <div class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
        
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block tracking-tight">Farma Form Builder</h1>
            </div>
            
            <div class="flex items-center gap-3 sm:gap-5">
                <button class="relative p-2 text-gray-400 hover:text-pink-600 transition-colors hover:bg-pink-50 rounded-full cursor-pointer group">
                    <img src="/assets/images/logo/logo.svg" alt="Admin User" class="w-8 h-8 rounded-full border border-gray-200 object-cover group-hover:border-pink-300 transition-colors">
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="max-w-6xl mx-auto space-y-6">
                
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-800">Customize Form Fields</h2>
                        <p class="text-sm text-gray-500 mt-1">Manage the dynamic fields shown on the Customize Farma page.</p>
                    </div>
                    <button onclick="openModal()" class="inline-flex items-center justify-center px-4 py-2.5 bg-pink-600 hover:bg-pink-700 text-white font-medium rounded-lg shadow-sm hover:shadow-md transition-all text-sm gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Add New Field
                    </button>
                </div>

                <!-- Fields List -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50/80 border-b border-gray-100 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                    <th class="px-6 py-4">Sort Order</th>
                                    <th class="px-6 py-4">Section</th>
                                    <th class="px-6 py-4">Field Label</th>
                                    <th class="px-6 py-4">Type</th>
                                    <th class="px-6 py-4 text-center">Required</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="fields-table-body" class="divide-y divide-gray-100 text-sm">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Field Modal -->
    <div id="fieldModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-gray-900/60 backdrop-blur-sm" aria-hidden="true" onclick="closeModal()"></div>
            
            <div class="relative inline-block w-full max-w-lg overflow-hidden text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl sm:my-8">
                <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h3 class="text-lg font-bold text-gray-800" id="modal-title">Add New Field</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-full hover:bg-gray-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <form id="fieldForm" class="px-6 py-5 space-y-5">
                    <input type="hidden" id="fieldId">
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Section <span class="text-red-500">*</span></label>
                        <select id="fieldSection" required class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-pink-500 focus:bg-white transition-colors text-sm">
                            <option value="Blouse Details">Blouse Details</option>
                            <option value="Other Info">Other Info</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Field Label <span class="text-red-500">*</span></label>
                        <input type="text" id="fieldLabel" required placeholder="e.g. Neck Design" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-pink-500 focus:bg-white transition-colors text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Type <span class="text-red-500">*</span></label>
                            <select id="fieldType" required onchange="toggleOptions()" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-pink-500 focus:bg-white transition-colors text-sm">
                                <option value="text">Short Text</option>
                                <option value="textarea">Long Text (Textarea)</option>
                                <option value="select">Dropdown (Select)</option>
                                <option value="radio">Radio Buttons</option>
                                <option value="checkbox">Checkbox</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Sort Order</label>
                            <input type="number" id="fieldSortOrder" value="0" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-pink-500 focus:bg-white transition-colors text-sm">
                        </div>
                    </div>

                    <div id="optionsContainer" class="hidden">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Options (Comma separated)</label>
                        <input type="text" id="fieldOptions" placeholder="e.g. Round, Square, V-Neck" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-pink-500 focus:bg-white transition-colors text-sm">
                        <p class="text-xs text-gray-500 mt-1">Required for Dropdown or Radio</p>
                    </div>

                    <div>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="fieldRequired" class="w-4 h-4 text-pink-600 border-gray-300 rounded focus:ring-pink-500">
                            <span class="text-sm font-medium text-gray-700">Is Required Field?</span>
                        </label>
                    </div>

                    <div class="pt-2 border-t border-gray-100 flex justify-end gap-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 rounded-lg transition-colors">Cancel</button>
                        <button type="submit" class="px-6 py-2 text-sm font-medium text-white bg-pink-600 hover:bg-pink-700 rounded-lg transition-colors shadow-sm">Save Field</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/admin/js/sidebar.js"></script>
    <script>
        function toggleMobileMenu() {
            const sidebar = document.getElementById('admin-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        let fields = [];

        async function loadFields() {
            try {
                const res = await fetch('/api/farma-fields');
                fields = await res.json();
                renderTable();
            } catch (err) {
                console.error(err);
                alert('Failed to load fields');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('fields-table-body');
            if (fields.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500 text-sm">No fields found. Create one to get started.</td></tr>';
                return;
            }

            tbody.innerHTML = fields.map(f => `
                <tr class="hover:bg-gray-50/50 transition-colors group">
                    <td class="px-6 py-4 font-medium text-gray-900">${f.sort_order}</td>
                    <td class="px-6 py-4 text-gray-600">
                        <span class="px-2 py-1 text-xs font-medium rounded-md ${f.section === 'Blouse Details' ? 'bg-blue-50 text-blue-700' : 'bg-purple-50 text-purple-700'}">${f.section}</span>
                    </td>
                    <td class="px-6 py-4 text-gray-900 font-medium">${f.field_label}</td>
                    <td class="px-6 py-4 text-gray-600 capitalize">${f.field_type}</td>
                    <td class="px-6 py-4 text-center">
                        ${f.is_required ? '<span class="text-green-500">Yes</span>' : '<span class="text-gray-400">No</span>'}
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick='editField(${JSON.stringify(f).replace(/'/g, "&#39;")})' class="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition-colors" title="Edit">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button onclick="deleteField(${f.id})" class="p-1.5 text-red-600 hover:bg-red-50 rounded transition-colors" title="Delete">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function toggleOptions() {
            const type = document.getElementById('fieldType').value;
            const container = document.getElementById('optionsContainer');
            if (['select', 'radio', 'checkbox'].includes(type)) {
                container.classList.remove('hidden');
                document.getElementById('fieldOptions').required = true;
            } else {
                container.classList.add('hidden');
                document.getElementById('fieldOptions').required = false;
            }
        }

        function openModal() {
            document.getElementById('fieldForm').reset();
            document.getElementById('fieldId').value = '';
            document.getElementById('modal-title').innerText = 'Add New Field';
            toggleOptions();
            document.getElementById('fieldModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('fieldModal').classList.add('hidden');
        }

        function editField(f) {
            document.getElementById('fieldId').value = f.id;
            document.getElementById('fieldSection').value = f.section;
            document.getElementById('fieldLabel').value = f.field_label;
            document.getElementById('fieldType').value = f.field_type;
            document.getElementById('fieldSortOrder').value = f.sort_order;
            document.getElementById('fieldOptions').value = f.options || '';
            document.getElementById('fieldRequired').checked = f.is_required === 1;
            
            document.getElementById('modal-title').innerText = 'Edit Field';
            toggleOptions();
            document.getElementById('fieldModal').classList.remove('hidden');
        }

        document.getElementById('fieldForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                id: document.getElementById('fieldId').value,
                section: document.getElementById('fieldSection').value,
                field_label: document.getElementById('fieldLabel').value,
                field_type: document.getElementById('fieldType').value,
                sort_order: document.getElementById('fieldSortOrder').value,
                options: document.getElementById('fieldOptions').value,
                is_required: document.getElementById('fieldRequired').checked ? 1 : 0
            };

            try {
                const res = await fetch('/api/admin/farma-fields', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    closeModal();
                    loadFields();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                alert('Failed to save field');
            }
        });

        async function deleteField(id) {
            if (!confirm('Are you sure you want to delete this field?')) return;
            try {
                const res = await fetch('/api/admin/farma-fields/' + id, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) loadFields();
            } catch (err) {
                alert('Failed to delete field');
            }
        }

        loadFields();
    </script>
</body>
</html>
