<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Devangi Products</title>
    <script src="/assets/js/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-tr from-pink-50 to-orange-50 flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden backdrop-blur-lg bg-opacity-90 border border-white/50 p-8">
        
        <div class="text-center mb-8">
            <a href="/index.html"><img src="/assets/images/logo/logo.svg" alt="Devangi Products Logo" class="mx-auto h-8 mb-6"></a>
            <h2 class="text-3xl font-bold text-gray-800">Create Account</h2>
            <p class="text-gray-500 mt-2 text-sm">Join us and experience the best shopping</p>
        </div>

        <div id="step-1" class="space-y-5 transition-all">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="fullname" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition bg-gray-50 text-gray-800" placeholder="John Doe" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition bg-gray-50 text-gray-800" placeholder="you@example.com" required>
            </div>
            
            <button id="send-otp-btn" class="w-full bg-gradient-to-r from-pink-500 to-orange-400 text-white font-semibold py-3 rounded-xl shadow-lg hover:shadow-pink-500/30 transform hover:-translate-y-0.5 transition duration-200">
                Send Verification OTP
            </button>
        </div>

        <div id="step-2" class="space-y-5 hidden transition-all">
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium text-gray-700">Enter 6-Digit OTP</label>
                </div>
                <input type="text" id="otp" maxlength="6" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 text-center tracking-[0.5em] font-bold text-xl transition bg-gray-50" placeholder="------" required>
                <p class="text-xs text-gray-400 mt-2 text-center" id="email-sent-to"></p>
            </div>
            
            <button id="verify-otp-btn" class="w-full bg-gradient-to-r from-pink-500 to-orange-400 text-white font-semibold py-3 rounded-xl shadow-lg hover:shadow-pink-500/30 transform hover:-translate-y-0.5 transition duration-200">
                Verify & Register
            </button>
        </div>

        <p class="text-center text-gray-500 text-sm mt-8">
            Already have an account? <a href="/login.html" class="text-pink-500 font-semibold hover:underline">Login</a>
        </p>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50 flex items-center">
        <span id="toast-msg"></span>
    </div>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
